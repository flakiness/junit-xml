name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Non-fork (push / same-repo PR): OIDC is available, so the CLI
      # converts and uploads directly. `always()` — red runs are the ones
      # worth tracking.
      - name: Convert + upload to flakiness.io
        if: always()
        run: pnpm dlx @flakiness/junit-xml --category bun --flakiness-project flakiness/junit-xml junit.xml

      - name: Upload Flakiness report artifact (fork PRs only)
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: actions/upload-artifact@v7
        with:
          name: flakiness-report-${{ github.job }}-${{ strategy.job-index }}
          path: flakiness-report/
          retention-days: 1
