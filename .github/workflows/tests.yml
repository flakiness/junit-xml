name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Non-fork (push / same-repo PR): OIDC is available, so the CLI
      # converts and uploads directly. `always()` — red runs are the ones
      # worth tracking.
      - name: Convert + upload to flakiness.io
        if: always()
        run: pnpm dlx @flakiness/junit-xml --category playwright --flakiness-project flakiness/junit-xml test-results/junit.xml

      - name: Upload Flakiness report artifact (fork PRs only)
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork
        uses: actions/upload-artifact@v4
        with:
          name: flakiness-report-${{ github.job }}-${{ strategy.job-index }}
          path: flakiness-report/
          retention-days: 1
