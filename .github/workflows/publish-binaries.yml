name: Publish Binaries

on:
  release:
    types: [published]

permissions:
  contents: write  # Required to upload release assets

jobs:
  publish-binaries:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Build CLI bundle
        run: |
          pnpm i --frozen-lockfile
          pnpm build

      - name: Compile single-file executables (all platforms)
        run: bash deployment/build.sh all

      - name: Compress binaries
        run: gzip -9 deployment/dist/*

      - name: Render installers from templates (pin to this release)
        run: |
          RELEASE_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          sed "s#{{RELEASE_BASE_URL}}#${RELEASE_BASE_URL}#g" \
            deployment/assets/install.template.sh > deployment/dist/install.sh
          sed "s#{{RELEASE_BASE_URL}}#${RELEASE_BASE_URL}#g" \
            deployment/assets/install.template.ps1 > deployment/dist/install.ps1

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            deployment/dist/*.gz \
            deployment/dist/install.sh \
            deployment/dist/install.ps1 \
            --clobber
